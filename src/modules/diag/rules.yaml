# usbtrace diag knowledge base.
#
# Each rule correlates events from the urb/enum/lifecycle/power probes per
# device (bus,dev) and emits a conclusion + suggested fix.
#
# Rule types:
#   event    - a `trigger` event, then `when` lookback conditions over the
#              device's recent-event window.
#   deadline - a device reached `reached_state` but did not reach
#              `without_state` within `timeout_ms` (checked periodically).
#
# Lookback condition fields:
#   kind        urb | enum | power | lifecycle | class | uvc_frame | uvc_vb2
#   match       { field: value, ... }   per-field constraint. The value prefix
#                                       picks the operator: bare = equals,
#                                       "!v" = not-equal, ">=v" / "<=v" =
#                                       numeric compare (e.g. frame_interval_ns).
#   status_in   [ ... ]                 urb->status is one of these
#   within_ms   N                       only events within N ms before trigger
#   count_gte   N                       need at least N matching events
#
# Template vars usable in conclusion/fix: {vid} {pid} {bus} {dev} {count}
# {window} {comm}.
#
# Edit this file and pass it with: sudo usbtrace diag --rules ./rules.yaml

rules:
  - id: disconnect-after-errors
    name: "Disconnect preceded by transfer errors"
    severity: error
    trigger: { kind: lifecycle, action: disconnect }
    when:
      - kind: urb
        match: { is_submit: 0 }
        status_in: [-71, -84, -110, -32, -19]   # EPROTO/EILSEQ/ETIMEDOUT/EPIPE/ENODEV
        within_ms: 2000
        count_gte: 3
    conclusion: "Device {vid}:{pid} (bus{bus}-dev{dev}) disconnected after {count} transfer errors within {window}ms; suspect cable/link/power."
    fix: "Check cable/connector and port power budget, reseat the device, try another port, and rule out EMI."

  - id: autosuspend-mid-transfer
    name: "Autosuspend during active transfers"
    severity: warn
    trigger: { kind: power, action: autosuspend }
    when:
      - kind: urb
        match: { xfer_type: "!2" }   # exclude control (ep0 enumeration chatter)
        within_ms: 200
        count_gte: 2
    conclusion: "Device {vid}:{pid} autosuspended while {count} data URB(s) were active in the last {window}ms; transfers may stall."
    fix: "Disable runtime autosuspend for this device (power/control = on) or raise autosuspend_delay_ms."

  - id: resume-storm
    name: "Autoresume storm"
    severity: warn
    trigger: { kind: power, action: autoresume }
    when:
      - kind: power
        match: { action: autoresume }
        within_ms: 5000
        count_gte: 5
    conclusion: "Device {vid}:{pid} autoresumed {count} times within {window}ms; power state is thrashing."
    fix: "Investigate the wakeup source / chatty driver; consider pinning power state or fixing remote-wakeup."

  - id: enum-stall
    name: "Enumeration stalled before CONFIGURED"
    severity: error
    deadline:
      kind: enum
      reached_state: ADDRESS
      without_state: CONFIGURED
      timeout_ms: 3000
    conclusion: "Device {vid}:{pid} (bus{bus}-dev{dev}) reached ADDRESS but never CONFIGURED within {window}ms; enumeration stalled."
    fix: "Check descriptor fetch / SET_CONFIGURATION; suspect power negotiation, marginal cable, or a flaky device controller."

  # ---- class-traffic rules (uvc/uac/hid/storage feed `kind: class`) ----------
  # These show cross-module cooperation: the class modules emit normalized
  # class_urb_event records and diag correlates them per device like any other
  # source. `class:` selects the subsystem; `error_count: "!0"` counts isoc
  # error URBs (the != operator).

  - id: video-isoc-errors
    name: "UVC isoc errors (frame corruption)"
    severity: warn
    trigger: { kind: class, class: video }
    when:
      - kind: class
        match: { class: video, error_count: "!0" }
        within_ms: 1000
        count_gte: 5
    conclusion: "Video device {vid}:{pid} saw {count} isoc-error URBs within {window}ms; expect dropped/corrupt frames. Suspect bandwidth, marginal cable, or EMI."
    fix: "Lower resolution/FPS or move to a dedicated bus/port (avoid sharing a hub), check the cable, and verify the controller's isoc bandwidth budget."

  - id: audio-isoc-errors
    name: "UAC isoc errors (xrun risk)"
    severity: warn
    trigger: { kind: class, class: audio }
    when:
      - kind: class
        match: { class: audio, error_count: "!0" }
        within_ms: 1000
        count_gte: 5
    conclusion: "Audio device {vid}:{pid} saw {count} isoc-error URBs within {window}ms; audio may glitch/underrun."
    fix: "Reduce sample rate/channels, avoid sharing the bus with other isoc devices, and check the cable/port."

  - id: storage-transfer-errors
    name: "Mass-storage transfer errors"
    severity: error
    trigger: { kind: class, class: storage }
    when:
      - kind: class
        match: { class: storage }
        status_in: [-71, -84, -110, -32, -19]   # EPROTO/EILSEQ/ETIMEDOUT/EPIPE/ENODEV
        within_ms: 3000
        count_gte: 2
    conclusion: "Storage device {vid}:{pid} had {count} bulk transfer errors within {window}ms; SCSI error recovery / bus reset likely. Suspect cable/power or a failing device."
    fix: "Reseat/replace the cable, try a powered port/hub, and check dmesg for reset/IO errors."

  # ---- uvc frame-level rules (uvc feeds `kind: uvc_frame`) --------------------
  # The uvc module reconstructs whole video frames in BPF (FID/EOF/PTS/SCR) and
  # emits one uvc_frame record per frame, so diag reasons about actual frames,
  # not just URBs: real drops and real frame rate. frame_errored marks a
  # dropped/corrupt frame; frame_interval_ns is the inter-frame gap (FPS source).

  - id: video-frame-drops
    name: "UVC frame drops"
    severity: warn
    trigger: { kind: uvc_frame }
    when:
      - kind: uvc_frame
        match: { frame_errored: 1 }
        within_ms: 2000
        count_gte: 5
    conclusion: "Video device {vid}:{pid} dropped/corrupted {count} frames within {window}ms; expect visible glitches or stutter."
    fix: "Lower resolution/FPS, use a dedicated bus/port (avoid shared hubs), and check the cable / EMI / isoc bandwidth budget."

  - id: video-low-fps
    name: "UVC low frame rate"
    severity: warn
    trigger: { kind: uvc_frame }
    when:
      - kind: uvc_frame
        match: { frame_interval_ns: ">=66000000" }   # >=66ms gap => <~15 fps
        within_ms: 3000
        count_gte: 10
    conclusion: "Video device {vid}:{pid} delivered {count} frames slower than ~15fps within {window}ms; bandwidth or format-negotiation issue."
    fix: "Check the negotiated format/frame interval, the isoc bandwidth budget, and contention from other devices on the same bus."

  # ---- uvc vb2 rules (uvc feeds `kind: uvc_vb2`) ----------------------------
  # vb2_buf_done tracepoint events carry kernel sequence gaps (vb2_seq_gap) and
  # optional wire->vb2 latency (wire_to_vb2_ns). Cross-kind rules correlate wire
  # health (uvc_frame) with vb2 drops to separate USB faults from driver/queue issues.

  - id: video-vb2-drops
    name: "UVC vb2 sequence gaps"
    severity: warn
    trigger: { kind: uvc_vb2 }
    when:
      - kind: uvc_vb2
        match: { vb2_seq_gap: 1 }
        within_ms: 3000
        count_gte: 3
    conclusion: "Video device {vid}:{pid} saw {count} vb2 sequence gap(s) within {window}ms; USB wire may be fine — suspect driver queue or host scheduling."
    fix: "Check buffer count in the capturing app, CPU load, and whether other processes hold vb2 buffers."

  - id: video-wire-ok-vb2-drops
    name: "USB OK but vb2 dropping"
    severity: warn
    trigger: { kind: uvc_vb2 }
    when:
      - kind: uvc_frame
        match: { frame_errored: "!1" }
        within_ms: 3000
        count_gte: 10
      - kind: uvc_vb2
        match: { vb2_seq_gap: 1 }
        within_ms: 3000
        count_gte: 3
    conclusion: "Device {vid}:{pid}: USB wire frames look clean within {window}ms but vb2 sequence gaps detected — not a USB/cable issue."
    fix: "Raise vb2 buffer count, reduce CPU contention, and check whether userspace is slow to dequeue buffers."

  - id: video-vb2-starved
    name: "UVC vb2 buffer starvation"
    severity: warn
    trigger: { kind: uvc_vb2 }
    when:
      - kind: uvc_vb2
        match: { vb2_starved: 1 }
        within_ms: 3000
        count_gte: 3
    conclusion: "Video device {vid}:{pid}: wire frames arrived {count} times with no vb2 queued buffer within {window}ms — app likely slow to QBUF."
    fix: "Increase buffer count in the capturing app; check DQBUF→QBUF latency and CPU load."
